<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHATTER — Real-Time Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- JOIN SCREEN -->
  <div id="join-screen" class="screen active">
    <div class="join-card">
      <div class="join-logo">
        <span class="logo-icon">◈</span>
        <h1>CHATTER</h1>
        <p class="tagline">Real-time. No frills. Just talk.</p>
      </div>
      <div class="join-form">
        <div class="input-group">
          <input
            type="text"
            id="username-input"
            placeholder="Your handle..."
            maxlength="24"
            autocomplete="off"
            spellcheck="false"
          />
          <span class="char-count" id="char-count">0/24</span>
        </div>
        <div id="join-error" class="error-msg hidden"></div>
        <button id="join-btn" class="btn-join">
          <span>Enter Chat</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
      <p class="join-hint">Pick a unique username to get started.</p>
    </div>
    <div class="grid-bg"></div>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chat-screen" class="screen">
    <div class="chat-layout">

      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <span class="logo-icon small">◈</span>
          <span class="sidebar-title">CHATTER</span>
        </div>
        <div class="online-label">
          <span class="pulse-dot"></span>
          <span id="online-count">0 online</span>
        </div>
        <ul id="user-list" class="user-list"></ul>
        <div class="sidebar-footer">
          <button id="leave-btn" class="btn-leave">Leave Room</button>
        </div>
      </aside>

      <!-- MAIN CHAT -->
      <main class="chat-main">
        <div class="chat-topbar">
          <div class="room-info">
            <span class="room-dot"></span>
            <span class="room-name"># global</span>
          </div>
          <span id="my-badge" class="my-badge"></span>
<button id="clear-btn" class="btn-clear" title="Clear chat for everyone">🗑 Clear</button>
        </div>

        <div id="messages" class="messages-area"></div>

        <div id="typing-indicator" class="typing-indicator hidden"></div>

        <div class="input-bar">
          <input
            type="text"
            id="msg-input"
            placeholder="Type a message..."
            maxlength="500"
            autocomplete="off"
          />
          <button id="send-btn" class="btn-send">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </main>

    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
